<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<title>Match Preview</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0f; overflow: hidden; }
  #root { position: absolute; inset: 0; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  kbd { font-family: ui-monospace, Menlo, monospace; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="sound-engine.js"></script>
<script src="team-data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="team-select.jsx"></script>
<script type="text/babel" src="match-hud.jsx"></script>
<script type="text/babel" src="football-match.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const DUMMY_MATCH = {
  id: 'preview',
  name: 'Match Preview',
  level: 'Preview',
  color: '#2d8a4e',
  team: 'aurora-fc',
  questions: []
};

function MatchPreviewApp() {
  const [phase, setPhase] = useState('select');
  const [result, setResult] = useState(null);

  const handleComplete = (won, id) => {
    setResult({ won, id });
    setPhase('done');
  };

  const handleExit = () => {
    setPhase('select');
    setResult(null);
  };

  return (
    <div style={{ position: 'absolute', inset: 0, background: '#0a0a0f', overflow: 'hidden' }}>

      {phase === 'match' && (
        <div style={{
          position: 'absolute', top: 14, left: 14, zIndex: 200,
          fontFamily: 'ui-monospace, Menlo, monospace', fontSize: 10,
          color: 'rgba(255,255,255,0.35)', letterSpacing: '0.1em'
        }}>
          MATCH PREVIEW
        </div>
      )}

      {phase === 'done' && (
        <div style={{
          position: 'absolute', inset: 0, zIndex: 100,
          background: result?.won
            ? 'linear-gradient(160deg, #14532d 0%, #0a0a0f 60%)'
            : 'linear-gradient(160deg, #450a0a 0%, #0a0a0f 60%)',
          display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center', gap: 20
        }}>
          <div style={{
            fontFamily: 'Georgia, serif', fontSize: 72, fontWeight: 900,
            color: result?.won ? '#86efac' : '#fca5a5',
            textShadow: `0 0 40px ${result?.won ? '#22c55e' : '#ef4444'}66`,
            letterSpacing: '-0.02em'
          }}>
            {result?.won ? 'VINST!' : 'FÖRLUST'}
          </div>
          <button onClick={handleExit} style={{
            background: 'rgba(255,255,255,0.08)',
            color: '#fff', border: '1px solid rgba(255,255,255,0.2)',
            borderRadius: 8, padding: '12px 28px',
            fontFamily: 'ui-monospace, Menlo, monospace',
            fontSize: 12, letterSpacing: '0.15em', cursor: 'pointer'
          }}>
            ← NY MATCH
          </button>
        </div>
      )}

      {(phase === 'select' || phase === 'match') && (
        <window.FootballMatch
          matchData={DUMMY_MATCH}
          onComplete={(won, id) => handleComplete(won, id)}
          onExit={handleExit}
        />
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MatchPreviewApp />);
</script>
</body>
</html>
