name: Deploy to GitHub Pages

on:
  push:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine target subdirectory
        id: target
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          # Replace any slashes in branch name with dashes (safe for URLs)
          SAFE_BRANCH="${BRANCH//\//-}"
          if [ "$BRANCH" = "main" ]; then
            echo "dir=" >> $GITHUB_OUTPUT
            echo "label=root" >> $GITHUB_OUTPUT
          else
            echo "dir=${SAFE_BRANCH}" >> $GITHUB_OUTPUT
            echo "label=${SAFE_BRANCH}" >> $GITHUB_OUTPUT
          fi

      - name: Stage files for deployment
        run: |
          mkdir -p _deploy/data/policies
          # Static game files
          cp *.html _deploy/ 2>/dev/null || true
          cp *.jsx _deploy/ 2>/dev/null || true

          # Bundle every version's baseline + best.json for the in-game selector.
          # We use rsync to mirror data/policies/ but exclude per-epoch JSONs and
          # SVG/JSON output that the browser doesn't need (keeps deploy small).
          rsync -a \
            --include='*/' \
            --include='baseline.json' \
            --include='baseline-genesis.json' \
            --include='candidate.json' \
            --include='opponents.json' \
            --include='best.json' \
            --exclude='*' \
            data/policies/ _deploy/data/policies/

          # Generate combined opponents.json by scanning v1/v2/v3 dirs in the
          # staging copy. Mirrors the Rust --build-opponents logic.
          python3 - <<'PY'
          import json, os, glob, re
          opponents = []
          def trailing_num(s):
              m = re.search(r'(\d+)$', s)
              return int(m.group(1)) if m else 0
          for ver in ('v1', 'v2', 'v3'):
              base = os.path.join('_deploy/data/policies', ver)
              if not os.path.isdir(base): continue
              if os.path.exists(os.path.join(base, 'baseline.json')):
                  opponents.append({
                      'name': f'{ver}-baseline',
                      'label': f'{ver} baseline (current champion)',
                      'version': ver,
                      'file': f'data/policies/{ver}/baseline.json',
                  })
              if os.path.exists(os.path.join(base, 'baseline-genesis.json')):
                  opponents.append({
                      'name': f'{ver}-genesis',
                      'label': f'{ver} genesis',
                      'version': ver,
                      'file': f'data/policies/{ver}/baseline-genesis.json',
                  })
              session_dirs = sorted(
                  [d for d in glob.glob(os.path.join(base, 'sessions', '*')) if os.path.isdir(d)],
                  key=lambda d: trailing_num(os.path.basename(d)),
              )
              for d in session_dirs:
                  best = os.path.join(d, 'best.json')
                  if not os.path.exists(best): continue
                  name = os.path.basename(d)
                  opponents.append({
                      'name': f'{ver}-{name}-best',
                      'label': f'{ver} {name} champion',
                      'version': ver,
                      'file': f'data/policies/{ver}/sessions/{name}/best.json',
                  })
          with open('_deploy/data/policies/opponents.json', 'w') as out:
              json.dump({'opponents': opponents}, out, indent=2)
          print(f"opponents.json: {len(opponents)} entries")
          PY
          ls -la _deploy/data/policies/

      - name: Deploy to gh-pages branch (subdir = ${{ steps.target.outputs.label }})
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
          destination_dir: ${{ steps.target.outputs.dir }}
          keep_files: true
          commit_message: "Deploy ${{ github.ref_name }} (${{ github.sha }})"
