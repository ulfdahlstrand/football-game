name: Deploy to GitHub Pages

on:
  push:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine target subdirectory
        id: target
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          # Replace any slashes in branch name with dashes (safe for URLs)
          SAFE_BRANCH="${BRANCH//\//-}"
          if [ "$BRANCH" = "main" ]; then
            echo "dir=" >> $GITHUB_OUTPUT
            echo "label=root" >> $GITHUB_OUTPUT
          else
            echo "dir=${SAFE_BRANCH}" >> $GITHUB_OUTPUT
            echo "label=${SAFE_BRANCH}" >> $GITHUB_OUTPUT
          fi

      - name: Stage files for deployment
        run: |
          mkdir -p _deploy/data/policies/sessions
          # Static game files
          cp *.html _deploy/ 2>/dev/null || true
          cp *.jsx _deploy/ 2>/dev/null || true
          # Policies the game loads at runtime
          cp data/policies/candidate.json _deploy/data/policies/ 2>/dev/null || true
          cp data/policies/baseline.json _deploy/data/policies/ 2>/dev/null || true
          cp data/policies/baseline-genesis.json _deploy/data/policies/ 2>/dev/null || true

          # Bundle each session's best champion for the in-game opponent selector
          for d in data/policies/sessions/*/; do
            name=$(basename "$d")
            if [ -f "$d/best.json" ]; then
              mkdir -p "_deploy/data/policies/sessions/$name"
              cp "$d/best.json" "_deploy/data/policies/sessions/$name/best.json"
            fi
          done

          # Generate opponents.json index (used by football-match.jsx selector)
          python3 - <<'PY'
          import json, os, glob, re
          opponents = []
          if os.path.exists('_deploy/data/policies/baseline.json'):
              opponents.append({
                  'name': 'baseline',
                  'label': 'Baseline (current champion)',
                  'file': 'data/policies/baseline.json',
              })
          if os.path.exists('_deploy/data/policies/baseline-genesis.json'):
              opponents.append({
                  'name': 'genesis',
                  'label': 'Genesis (hand-tuned original)',
                  'file': 'data/policies/baseline-genesis.json',
              })
          def session_key(p):
              n = os.path.basename(os.path.dirname(p))
              m = re.search(r'(\d+)$', n)
              return (n[:len(n)-len(m.group(1))] if m else n, int(m.group(1)) if m else 0)
          for f in sorted(glob.glob('_deploy/data/policies/sessions/*/best.json'), key=session_key):
              name = os.path.basename(os.path.dirname(f))
              opponents.append({
                  'name': f'{name}-best',
                  'label': f'{name} champion',
                  'file': f'data/policies/sessions/{name}/best.json',
              })
          with open('_deploy/data/policies/opponents.json', 'w') as out:
              json.dump({'opponents': opponents}, out, indent=2)
          print(f"opponents.json: {len(opponents)} entries")
          PY
          ls -la _deploy/data/policies/

      - name: Deploy to gh-pages branch (subdir = ${{ steps.target.outputs.label }})
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
          destination_dir: ${{ steps.target.outputs.dir }}
          keep_files: true
          commit_message: "Deploy ${{ github.ref_name }} (${{ github.sha }})"
