<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 540" width="640" height="540">
  <defs>
    <style>
      text { font-family: 'ui-monospace', 'Courier New', monospace; }
    </style>
    <!-- Scanline overlay -->
    <pattern id="scanlines" x="0" y="0" width="2" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="2" height="1" fill="rgba(0,0,0,0.18)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="640" height="540" fill="#0d0d0d"/>
  <rect width="640" height="540" fill="url(#scanlines)"/>

  <!-- Outer border -->
  <rect x="8" y="8" width="624" height="524" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="10" y="10" width="620" height="520" fill="none" stroke="#1e3a1e" stroke-width="1"/>

  <!-- ═══ HEADER ═══ -->
  <rect x="10" y="10" width="620" height="58" fill="#0f1f0f"/>
  <rect x="10" y="68" width="620" height="2" fill="#1a4a1a"/>

  <!-- FULLTIME label -->
  <text x="320" y="28" text-anchor="middle" fill="#4a8a4a" font-size="9" letter-spacing="6">F U L L T I D</text>

  <!-- Team names + score -->
  <text x="170" y="55" text-anchor="middle" fill="#5599dd" font-size="18" font-weight="bold" letter-spacing="1">BLÅLAG</text>
  <text x="320" y="56" text-anchor="middle" fill="#f0f0f0" font-size="28" font-weight="bold">3 – 1</text>
  <text x="470" y="55" text-anchor="middle" fill="#dd5533" font-size="18" font-weight="bold" letter-spacing="1">RÖDLAG</text>

  <!-- ═══ STATS SECTION ═══ -->
  <!-- Section header -->
  <rect x="10" y="70" width="620" height="18" fill="#111a11"/>
  <text x="320" y="83" text-anchor="middle" fill="#3a6a3a" font-size="9" letter-spacing="5">S T A T I S T I K</text>

  <!-- Stats rows: alternating background -->
  <!-- Row 1: Skott på mål / Mål -->
  <rect x="10" y="88" width="620" height="26" fill="#0f150f"/>
  <text x="205" y="105" text-anchor="end" fill="#5599dd" font-size="14" font-weight="bold">7</text>
  <text x="215" y="101" text-anchor="start" fill="#666" font-size="7">SKOTT</text>
  <text x="215" y="110" text-anchor="start" fill="#aaa" font-size="7">PÅ MÅL</text>
  <!-- center bar -->
  <rect x="260" y="93" width="120" height="16" fill="#0a0f0a" rx="2"/>
  <!-- blue portion: 7/10 = 70% -->
  <rect x="261" y="94" width="83" height="14" fill="#3a5a8a" rx="1"/>
  <!-- red portion: 3/10 = 30% -->
  <rect x="344" y="94" width="35" height="14" fill="#8a3a2a" rx="1"/>
  <line x1="380" y1="93" x2="380" y2="109" stroke="#222" stroke-width="1"/>
  <text x="425" y="101" text-anchor="start" fill="#aaa" font-size="7">SKOTT</text>
  <text x="425" y="110" text-anchor="start" fill="#666" font-size="7">PÅ MÅL</text>
  <text x="415" y="105" text-anchor="end" fill="#dd5533" font-size="14" font-weight="bold">3</text>

  <!-- Row 2: Mål -->
  <rect x="10" y="114" width="620" height="26" fill="#131a13"/>
  <text x="205" y="131" text-anchor="end" fill="#5599dd" font-size="14" font-weight="bold">3</text>
  <text x="215" y="127" text-anchor="start" fill="#666" font-size="7">MÅL</text>
  <text x="215" y="136" text-anchor="start" fill="#aaa" font-size="7">&amp; RESULTAT</text>
  <rect x="260" y="119" width="120" height="16" fill="#0a0f0a" rx="2"/>
  <rect x="261" y="120" width="90" height="14" fill="#3a6a8a" rx="1"/>
  <rect x="351" y="120" width="28" height="14" fill="#8a3a2a" rx="1"/>
  <line x1="380" y1="119" x2="380" y2="135" stroke="#222" stroke-width="1"/>
  <text x="415" y="127" text-anchor="start" fill="#aaa" font-size="7">MÅL</text>
  <text x="425" y="136" text-anchor="start" fill="#666" font-size="7">&amp; RESULTAT</text>
  <text x="415" y="131" text-anchor="end" fill="#dd5533" font-size="14" font-weight="bold">1</text>

  <!-- Row 3: Frisparkar -->
  <rect x="10" y="140" width="620" height="26" fill="#0f150f"/>
  <text x="205" y="157" text-anchor="end" fill="#5599dd" font-size="14" font-weight="bold">5</text>
  <text x="215" y="153" text-anchor="start" fill="#666" font-size="7">FRISPARKAR</text>
  <text x="215" y="162" text-anchor="start" fill="#aaa" font-size="7">1 MÅL</text>
  <rect x="260" y="145" width="120" height="16" fill="#0a0f0a" rx="2"/>
  <rect x="261" y="146" width="71" height="14" fill="#3a5a8a" rx="1"/>
  <rect x="332" y="146" width="47" height="14" fill="#8a3a2a" rx="1"/>
  <line x1="380" y1="145" x2="380" y2="161" stroke="#222" stroke-width="1"/>
  <text x="415" y="153" text-anchor="start" fill="#aaa" font-size="7">FRISPARKAR</text>
  <text x="415" y="162" text-anchor="start" fill="#666" font-size="7">0 MÅL</text>
  <text x="415" y="157" text-anchor="end" fill="#dd5533" font-size="14" font-weight="bold">8</text>

  <!-- Row 4: Hörnor -->
  <rect x="10" y="166" width="620" height="26" fill="#131a13"/>
  <text x="205" y="183" text-anchor="end" fill="#5599dd" font-size="14" font-weight="bold">4</text>
  <text x="215" y="179" text-anchor="start" fill="#666" font-size="7">HÖRNOR</text>
  <text x="215" y="188" text-anchor="start" fill="#aaa" font-size="7">1 MÅL</text>
  <rect x="260" y="171" width="120" height="16" fill="#0a0f0a" rx="2"/>
  <rect x="261" y="172" width="60" height="14" fill="#3a5a8a" rx="1"/>
  <rect x="321" y="172" width="58" height="14" fill="#8a3a2a" rx="1"/>
  <line x1="380" y1="171" x2="380" y2="187" stroke="#222" stroke-width="1"/>
  <text x="415" y="179" text-anchor="start" fill="#aaa" font-size="7">HÖRNOR</text>
  <text x="415" y="188" text-anchor="start" fill="#666" font-size="7">0 MÅL</text>
  <text x="415" y="183" text-anchor="end" fill="#dd5533" font-size="14" font-weight="bold">4</text>

  <!-- Row 5: Bollinnehav -->
  <rect x="10" y="192" width="620" height="26" fill="#0f150f"/>
  <text x="205" y="209" text-anchor="end" fill="#5599dd" font-size="14" font-weight="bold">58%</text>
  <text x="215" y="205" text-anchor="start" fill="#666" font-size="7">BOLL-</text>
  <text x="215" y="214" text-anchor="start" fill="#aaa" font-size="7">INNEHAV</text>
  <rect x="260" y="197" width="120" height="16" fill="#0a0f0a" rx="2"/>
  <rect x="261" y="198" width="69" height="14" fill="#3a5a8a" rx="1"/>
  <rect x="330" y="198" width="49" height="14" fill="#8a3a2a" rx="1"/>
  <line x1="380" y1="197" x2="380" y2="213" stroke="#222" stroke-width="1"/>
  <text x="415" y="205" text-anchor="start" fill="#aaa" font-size="7">BOLL-</text>
  <text x="415" y="214" text-anchor="start" fill="#666" font-size="7">INNEHAV</text>
  <text x="415" y="209" text-anchor="end" fill="#dd5533" font-size="14" font-weight="bold">42%</text>

  <!-- Row 6: Bollinnehav egna -->
  <rect x="10" y="218" width="620" height="26" fill="#131a13"/>
  <text x="205" y="235" text-anchor="end" fill="#5599dd" font-size="14" font-weight="bold">24%</text>
  <text x="215" y="231" text-anchor="start" fill="#666" font-size="7">INNEHAV</text>
  <text x="215" y="240" text-anchor="start" fill="#aaa" font-size="7">EGET HALF</text>
  <rect x="260" y="223" width="120" height="16" fill="#0a0f0a" rx="2"/>
  <rect x="261" y="224" width="29" height="14" fill="#2a4a6a" rx="1"/>
  <rect x="290" y="224" width="89" height="14" fill="#6a2a1a" rx="1"/>
  <line x1="380" y1="223" x2="380" y2="239" stroke="#222" stroke-width="1"/>
  <text x="415" y="231" text-anchor="start" fill="#aaa" font-size="7">INNEHAV</text>
  <text x="415" y="240" text-anchor="start" fill="#666" font-size="7">EGET HALF</text>
  <text x="415" y="235" text-anchor="end" fill="#dd5533" font-size="14" font-weight="bold">37%</text>

  <!-- Row 7: Bollinnehav motståndares -->
  <rect x="10" y="244" width="620" height="26" fill="#0f150f"/>
  <text x="205" y="261" text-anchor="end" fill="#5599dd" font-size="14" font-weight="bold">34%</text>
  <text x="215" y="257" text-anchor="start" fill="#666" font-size="7">INNEHAV</text>
  <text x="215" y="266" text-anchor="start" fill="#aaa" font-size="7">MOTST. HALF</text>
  <rect x="260" y="249" width="120" height="16" fill="#0a0f0a" rx="2"/>
  <rect x="261" y="250" width="81" height="14" fill="#4a6a9a" rx="1"/>
  <rect x="342" y="250" width="36" height="14" fill="#5a2a1a" rx="1"/>
  <line x1="380" y1="249" x2="380" y2="265" stroke="#222" stroke-width="1"/>
  <text x="415" y="257" text-anchor="start" fill="#aaa" font-size="7">INNEHAV</text>
  <text x="415" y="266" text-anchor="start" fill="#666" font-size="7">MOTST. HALF</text>
  <text x="415" y="261" text-anchor="end" fill="#dd5533" font-size="14" font-weight="bold">5%</text>

  <!-- ═══ GOAL SCORERS ═══ -->
  <rect x="10" y="270" width="620" height="2" fill="#1a4a1a"/>
  <rect x="10" y="272" width="620" height="18" fill="#111a11"/>
  <text x="320" y="285" text-anchor="middle" fill="#3a6a3a" font-size="9" letter-spacing="5">M Å L G Ö R A R E</text>

  <!-- Blue team goals (left) -->
  <rect x="10" y="290" width="305" height="80" fill="#0c130c"/>
  <text x="22" y="308" fill="#5599dd" font-size="10" font-weight="bold">BLÅLAG</text>
  <!-- player goal rows -->
  <text x="22" y="326" fill="#e0e0e0" font-size="11">⚽ JOHANSSON</text>
  <text x="210" y="326" fill="#888" font-size="9">14'  42'</text>
  <text x="22" y="344" fill="#e0e0e0" font-size="11">⚽ LINDQVIST</text>
  <text x="210" y="344" fill="#888" font-size="9">67'</text>
  <text x="22" y="360" fill="#666" font-size="9">  assist: ERIKSSON (2), BERG (1)</text>

  <!-- Red team goals (right) -->
  <rect x="315" y="290" width="315" height="80" fill="#130c0c"/>
  <text x="327" y="308" fill="#dd5533" font-size="10" font-weight="bold">RÖDLAG</text>
  <text x="327" y="326" fill="#e0e0e0" font-size="11">⚽ ANDERSSON</text>
  <text x="520" y="326" fill="#888" font-size="9">55'</text>
  <text x="327" y="342" fill="#666" font-size="9">  assist: NILSSON (1)</text>

  <!-- ═══ TIMELINE ═══ -->
  <rect x="10" y="370" width="620" height="2" fill="#1a4a1a"/>
  <rect x="10" y="372" width="620" height="18" fill="#111a11"/>
  <text x="320" y="385" text-anchor="middle" fill="#3a6a3a" font-size="9" letter-spacing="5">M Å L T I D L I N J E</text>

  <!-- Timeline bar -->
  <rect x="30" y="405" width="580" height="6" fill="#1a2a1a" rx="3"/>
  <!-- Halftime marker -->
  <line x1="320" y1="398" x2="320" y2="418" stroke="#2a4a2a" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="320" y="427" text-anchor="middle" fill="#2a5a2a" font-size="7">HT</text>

  <!-- 0' and 90' labels -->
  <text x="30" y="427" text-anchor="middle" fill="#3a5a3a" font-size="8">0'</text>
  <text x="610" y="427" text-anchor="middle" fill="#3a5a3a" font-size="8">90'</text>

  <!-- Goal markers: JOHANSSON 14' (blue) -->
  <!-- 14/90 * 580 + 30 = ~120 -->
  <line x1="120" y1="396" x2="120" y2="414" stroke="#5599dd" stroke-width="1.5"/>
  <circle cx="120" cy="408" r="5" fill="#3a5a8a" stroke="#5599dd" stroke-width="1.5"/>
  <text x="120" y="394" text-anchor="middle" fill="#5599dd" font-size="8" font-weight="bold">14'</text>
  <!-- small ball icon using text -->
  <text x="120" y="443" text-anchor="middle" fill="#5599dd" font-size="7">JHN</text>

  <!-- JOHANSSON 42' (blue) -->
  <!-- 42/90 * 580 + 30 = ~301 -->
  <line x1="301" y1="396" x2="301" y2="414" stroke="#5599dd" stroke-width="1.5"/>
  <circle cx="301" cy="408" r="5" fill="#3a5a8a" stroke="#5599dd" stroke-width="1.5"/>
  <text x="301" y="394" text-anchor="middle" fill="#5599dd" font-size="8" font-weight="bold">42'</text>
  <text x="301" y="443" text-anchor="middle" fill="#5599dd" font-size="7">JHN</text>

  <!-- ANDERSSON 55' (red) -->
  <!-- 55/90 * 580 + 30 = ~385 -->
  <line x1="385" y1="396" x2="385" y2="414" stroke="#dd5533" stroke-width="1.5"/>
  <circle cx="385" cy="408" r="5" fill="#8a3a2a" stroke="#dd5533" stroke-width="1.5"/>
  <text x="385" y="394" text-anchor="middle" fill="#dd5533" font-size="8" font-weight="bold">55'</text>
  <text x="385" y="443" text-anchor="middle" fill="#dd5533" font-size="7">AND</text>

  <!-- LINDQVIST 67' (blue) -->
  <!-- 67/90 * 580 + 30 = ~462 -->
  <line x1="462" y1="396" x2="462" y2="414" stroke="#5599dd" stroke-width="1.5"/>
  <circle cx="462" cy="408" r="5" fill="#3a5a8a" stroke="#5599dd" stroke-width="1.5"/>
  <text x="462" y="394" text-anchor="middle" fill="#5599dd" font-size="8" font-weight="bold">67'</text>
  <text x="462" y="443" text-anchor="middle" fill="#5599dd" font-size="7">LIN</text>

  <!-- Half labels on timeline -->
  <text x="175" y="460" text-anchor="middle" fill="#1e3e1e" font-size="8">1:A HALVLEK</text>
  <text x="465" y="460" text-anchor="middle" fill="#1e3e1e" font-size="8">2:A HALVLEK</text>

  <!-- ═══ FOOTER BUTTONS ═══ -->
  <rect x="10" y="472" width="620" height="2" fill="#1a4a1a"/>
  <rect x="10" y="474" width="620" height="56" fill="#0b120b"/>

  <!-- Continue button -->
  <rect x="200" y="486" width="240" height="32" fill="#0f200f" stroke="#2a6a2a" stroke-width="1" rx="2"/>
  <text x="320" y="506" text-anchor="middle" fill="#4aaa4a" font-size="13" letter-spacing="2">[ FORTSÄTT ]</text>

  <!-- Legend -->
  <circle cx="45" cy="497" r="5" fill="#3a5a8a" stroke="#5599dd" stroke-width="1.5"/>
  <text x="55" y="501" fill="#5599dd" font-size="8">= MÅL BLÅ</text>
  <circle cx="45" cy="513" r="5" fill="#8a3a2a" stroke="#dd5533" stroke-width="1.5"/>
  <text x="55" y="517" fill="#dd5533" font-size="8">= MÅL RÖD</text>

  <!-- Scanline overlay on top -->
  <rect width="640" height="540" fill="url(#scanlines)" opacity="0.4"/>
</svg>
